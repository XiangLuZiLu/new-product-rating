name = "product-review-pages"
compatibility_date = "2026-06-24"
pages_build_output_dir = "public"

# 后台入口、账号、密码、存储方式建议在 Cloudflare Pages 控制台的
# Settings -> Environment variables 中配置，不要写入公开仓库。
#
# 基础必填建议：
# ADMIN_PATH = "review-admin-2026"       # 后台访问：域名/review-admin-2026
# ADMIN_USERNAME = "admin"              # 后台账号
# ADMIN_PASSWORD = "change-me"          # 后台密码，生产环境请用强密码
# SESSION_SECRET = "long-random-string" # Cookie 签名密钥
# STORAGE_DRIVER = "d1"                 # 评分/历史数据：d1、kv 或 http
# IMAGE_STORAGE_DRIVER = "r2"           # 图片文件：url、r2 或 s3
# IMAGE_MAX_SIZE_MB = "10"              # 单张图片最大 MB
#
# 使用 D1 存评分/历史数据时，取消下面注释并替换 database_id：
[[d1_databases]]
binding = "DB"
database_name = "product-review-db"
database_id = "5a553594-8a1d-437e-b719-6ed707338252"
#
# 使用 KV 存评分/历史数据时，取消下面注释并替换 id：
# [[kv_namespaces]]
# binding = "KV"
# id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
#
# 使用 R2 存图片时，取消下面注释并替换 bucket_name：
# [[r2_buckets]]
# binding = "IMAGE_BUCKET"
# bucket_name = "product-review-images"
#
# 如果 R2 配了自定义公开域名，建议在环境变量中添加：
# PUBLIC_IMAGE_BASE_URL = "https://img.yourdomain.com"
# 不配置时，系统会通过 /api/images/<key> 读取 R2 图片。
#
# 使用七牛云、阿里云 OSS、腾讯云 COS、MinIO 等 S3 兼容对象存储时，不需要 R2 binding，改配：
# IMAGE_STORAGE_DRIVER = "s3"
# S3_ENDPOINT = "https://s3-compatible-endpoint.example.com"
# S3_BUCKET = "your-bucket"
# S3_REGION = "us-east-1"
# S3_ACCESS_KEY_ID = "your-access-key"
# S3_SECRET_ACCESS_KEY = "your-secret-key"
# S3_PUBLIC_BASE_URL = "https://your-cdn-or-bucket-domain.example.com" # 推荐配置，否则返回源站对象地址
# S3_FORCE_PATH_STYLE = "true" # 如果服务商要求 bucket.endpoint 形式，改为 false
#
# 使用自定义数据库 HTTP 接口时，不需要 D1/KV binding，改配：
# STORAGE_DRIVER = "http"
# STORAGE_API_URL = "https://your-api.example.com/product-review"
# STORAGE_API_TOKEN = "your-api-token"
